<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="theme-color" content="#1a472a">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="扑克计算器">
    <meta name="description" content="德州扑克概率计算器 - 支持全阶段牌型概率计算，纯前端无需联网">
    <meta name="format-detection" content="telephone=no">
    
    <title>德州扑克概率计算器</title>
    
    <link rel="manifest" href="manifest.json">
    <link rel="apple-touch-icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 192 192'%3E%3Crect width='192' height='192' rx='24' fill='%231a472a'/%3E%3Ctext x='96' y='120' font-size='100' text-anchor='middle' fill='%23ffd700'%3E♠%3C/text%3E%3C/svg%3E">
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div class="container">
        <header>
            <h1>♠ 德州扑克概率计算器 ♥</h1>
            <p>输入你的手牌和公共牌，快速计算顶级牌型概率</p>
        </header>

        <!-- 阶段指示器 -->
        <div class="stage-indicator">
            <div class="stage-item" id="stage-preflop">Pre-flop</div>
            <div class="stage-item" id="stage-flop">Flop</div>
            <div class="stage-item" id="stage-turn">Turn</div>
            <div class="stage-item" id="stage-river">River</div>
        </div>

        <!-- 已选牌展示 -->
        <div class="section">
            <h2>🃏 当前选择</h2>
            <div class="selected-cards-area">
                <div class="card-group">
                    <h3>你的手牌 (2张)</h3>
                    <div class="card-slots" id="hole-slots">
                        <div class="card-slot" data-index="0" onclick="removeHoleCard(0)"></div>
                        <div class="card-slot" data-index="1" onclick="removeHoleCard(1)"></div>
                    </div>
                </div>
                <div class="card-group">
                    <h3>公共牌 (0-5张)</h3>
                    <div class="card-slots" id="community-slots">
                        <div class="card-slot" data-index="0" onclick="removeCommunityCard(0)"></div>
                        <div class="card-slot" data-index="1" onclick="removeCommunityCard(1)"></div>
                        <div class="card-slot" data-index="2" onclick="removeCommunityCard(2)"></div>
                        <div class="card-slot" data-index="3" onclick="removeCommunityCard(3)"></div>
                        <div class="card-slot" data-index="4" onclick="removeCommunityCard(4)"></div>
                    </div>
                </div>
            </div>
        </div>

        <!-- 牌选择器 -->
        <div class="section">
            <h2>🎯 点击选牌</h2>
            <p style="color:#aaa;margin-bottom:10px;font-size:0.9em;">先选2张手牌，再选公共牌。点击已选的牌可取消。</p>
            <div class="card-selector" id="card-grid"></div>
        </div>

        <!-- 操作按钮 -->
        <div class="section" style="text-align:center;">
            <div class="actions">
                <button class="btn btn-primary" id="calc-btn" onclick="calculate()" disabled>🚀 计算概率</button>
                <button class="btn btn-secondary" onclick="clearAll()">🗑️ 清除</button>
            </div>
        </div>

        <!-- 进度条 -->
        <div class="progress-container" id="progress-area">
            <div class="progress-text" id="progress-text">正在计算...</div>
            <div class="progress-bar"><div class="progress-fill" id="progress-fill"></div></div>
        </div>

        <!-- 结果展示 -->
        <div class="section result-section" id="result-area">
            <h2>📊 概率分析</h2>
            <div class="result-info" id="result-info"></div>
            <div class="probability-list" id="probability-list"></div>
        </div>

        <footer>
            <p>德州扑克概率计算器 | 仅供学习娱乐 | 理性游戏</p>
        </footer>
    </div>

    <!-- PWA 安装提示条 -->
    <div class="pwa-install-banner" id="pwa-banner">
        <span>📲 添加到主屏幕，像App一样使用</span>
        <button class="btn btn-primary" id="pwa-install-btn" onclick="installPWA()">安装</button>
        <button class="btn btn-secondary" onclick="dismissPWA()" style="padding:8px 14px;font-size:0.85em;">✕</button>
    </div>

    <script src="js/poker-engine.js"></script>
    <script>
        // ============ PWA 支持 ============
        let deferredPrompt = null;
        
        // 注册 Service Worker
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('/sw.js')
                    .then(reg => console.log('SW 注册成功'))
                    .catch(err => console.log('SW 注册失败:', err));
            });
        }
        
        // 监听 PWA 安装提示
        window.addEventListener('beforeinstallprompt', (e) => {
            e.preventDefault();
            deferredPrompt = e;
            // 延迟显示安装提示，不要一打开就弹
            setTimeout(() => {
                const banner = document.getElementById('pwa-banner');
                if (banner && !localStorage.getItem('pwa-dismissed')) {
                    banner.classList.add('show');
                }
            }, 3000);
        });
        
        function installPWA() {
            if (deferredPrompt) {
                deferredPrompt.prompt();
                deferredPrompt.userChoice.then((choiceResult) => {
                    if (choiceResult.outcome === 'accepted') {
                        console.log('用户接受了PWA安装');
                    }
                    deferredPrompt = null;
                    document.getElementById('pwa-banner').classList.remove('show');
                });
            } else {
                // iOS Safari 不支持 beforeinstallprompt，显示手动安装提示
                alert('iOS用户：请点击 Safari 底部分享按钮，然后选择「添加到主屏幕」');
            }
        }
        
        function dismissPWA() {
            document.getElementById('pwa-banner').classList.remove('show');
            localStorage.setItem('pwa-dismissed', 'true');
        }
        
        // 检测 standalone 模式
        if (window.matchMedia('(display-mode: standalone)').matches || navigator.standalone === true) {
            document.body.classList.add('standalone');
        }

        // ============ 核心逻辑 ============
        let holeCards = [];
        let communityCards = [];

        function init() {
            renderCardGrid();
            updateUI();
        }

        function renderCardGrid() {
            const grid = document.getElementById('card-grid');
            grid.innerHTML = '';
            for (const suit of SUITS) {
                const suitClass = (suit === '♥' || suit === '♦') ? 'heart diamond' : 'spade club';
                for (const rank of RANKS) {
                    const btn = document.createElement('button');
                    btn.className = `card-btn ${suitClass}`;
                    btn.textContent = suit + rank;
                    btn.dataset.card = suit + rank;
                    btn.setAttribute('aria-label', suit + rank);
                    btn.onclick = () => onCardClick(suit, rank);
                    grid.appendChild(btn);
                }
            }
        }

        function onCardClick(suit, rank) {
            const cardStr = suit + rank;
            const card = new Card(suit, rank);
            const inHole = holeCards.find(c => c.toString() === cardStr);
            const inCommunity = communityCards.find(c => c.toString() === cardStr);
            
            if (inHole) {
                holeCards = holeCards.filter(c => c.toString() !== cardStr);
            } else if (inCommunity) {
                communityCards = communityCards.filter(c => c.toString() !== cardStr);
            } else if (holeCards.length < 2) {
                holeCards.push(card);
            } else if (communityCards.length < 5) {
                communityCards.push(card);
            }
            updateUI();
        }

        function removeHoleCard(index) {
            if (index < holeCards.length) {
                holeCards.splice(index, 1);
                updateUI();
            }
        }

        function removeCommunityCard(index) {
            if (index < communityCards.length) {
                communityCards.splice(index, 1);
                updateUI();
            }
        }

        function clearAll() {
            holeCards = [];
            communityCards = [];
            document.getElementById('result-area').classList.remove('visible');
            document.getElementById('progress-area').classList.remove('visible');
            updateUI();
        }

        function updateUI() {
            const holeSlots = document.getElementById('hole-slots').children;
            for (let i = 0; i < 2; i++) {
                const slot = holeSlots[i];
                if (i < holeCards.length) {
                    const c = holeCards[i];
                    slot.textContent = c.toString();
                    slot.className = 'card-slot filled ' + ((c.suit === '♥' || c.suit === '♦') ? 'red' : 'black');
                } else {
                    slot.textContent = '';
                    slot.className = 'card-slot';
                }
            }
            
            const commSlots = document.getElementById('community-slots').children;
            for (let i = 0; i < 5; i++) {
                const slot = commSlots[i];
                if (i < communityCards.length) {
                    const c = communityCards[i];
                    slot.textContent = c.toString();
                    slot.className = 'card-slot filled ' + ((c.suit === '♥' || c.suit === '♦') ? 'red' : 'black');
                } else {
                    slot.textContent = '';
                    slot.className = 'card-slot';
                }
            }
            
            document.querySelectorAll('.card-btn').forEach(btn => {
                const cs = btn.dataset.card;
                const inH = holeCards.find(c => c.toString() === cs);
                const inC = communityCards.find(c => c.toString() === cs);
                btn.classList.remove('selected', 'disabled');
                if (inH || inC) btn.classList.add('selected');
                if (holeCards.length >= 2 && communityCards.length >= 5 && !inH && !inC) {
                    btn.classList.add('disabled');
                }
            });
            
            const stages = ['preflop', 'flop', 'turn', 'river'];
            const cc = communityCards.length;
            let active = cc >= 5 ? 3 : cc >= 4 ? 2 : cc >= 3 ? 1 : 0;
            stages.forEach((s, i) => {
                const el = document.getElementById('stage-' + s);
                el.classList.toggle('active', i === active);
            });
            
            document.getElementById('calc-btn').disabled = holeCards.length !== 2;
        }

        async function calculate() {
            if (holeCards.length !== 2) return;
            const progressArea = document.getElementById('progress-area');
            const progressFill = document.getElementById('progress-fill');
            const progressText = document.getElementById('progress-text');
            const resultArea = document.getElementById('result-area');
            
            progressArea.classList.add('visible');
            resultArea.classList.remove('visible');
            progressFill.style.width = '0%';
            
            await new Promise(r => setTimeout(r, 50));
            progressText.textContent = '正在计算中...';
            progressFill.style.width = '30%';
            await new Promise(r => setTimeout(r, 50));
            
            setTimeout(() => {
                const result = calculateProbabilities(holeCards, communityCards);
                progressFill.style.width = '100%';
                progressText.textContent = '计算完成！';
                setTimeout(() => {
                    progressArea.classList.remove('visible');
                    showResults(result);
                }, 300);
            }, 100);
        }

        function showResults(result) {
            const resultArea = document.getElementById('result-area');
            const resultInfo = document.getElementById('result-info');
            const probList = document.getElementById('probability-list');
            
            const methodText = result.exact ? '精确计算' : '蒙特卡洛模拟';
            const badgeClass = result.exact ? 'exact-badge' : 'monte-badge';
            resultInfo.innerHTML = `
                <div>${getStageName()}</div>
                <div><span class="${badgeClass}">${methodText}</span></div>
                <div style="margin-top:4px;font-size:0.8em;color:#888;">评估 ${result.total.toLocaleString()} 种组合</div>
            `;
            
            probList.innerHTML = '';
            const maxProb = result.top7[0].probability;
            
            for (let i = 0; i < result.top7.length; i++) {
                const item = result.top7[i];
                if (item.probability <= 0) continue;
                const pct = item.probability.toFixed(2);
                const wp = maxProb > 0 ? (item.probability / maxProb * 100) : 0;
                let bc = 'very-low';
                if (item.probability > 20) bc = 'high';
                else if (item.probability > 5) bc = 'medium';
                else if (item.probability > 1) bc = 'low';
                
                const div = document.createElement('div');
                div.className = 'prob-item';
                div.innerHTML = `
                    <div class="prob-label">${item.name}</div>
                    <div class="prob-bar-container">
                        <div class="prob-bar ${bc}" style="width:0%">${pct}%</div>
                    </div>
                `;
                probList.appendChild(div);
                setTimeout(() => {
                    div.querySelector('.prob-bar').style.width = Math.max(wp, 8) + '%';
                }, 100 + i * 100);
            }
            
            resultArea.classList.add('visible');
            resultArea.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
        }

        function getStageName() {
            const c = communityCards.length;
            if (c === 0) return 'Pre-flop（翻牌前）';
            if (c === 3) return 'Flop（翻牌圈）';
            if (c === 4) return 'Turn（转牌圈）';
            if (c === 5) return 'River（河牌圈）';
            return '未知阶段';
        }

        init();
    </script>
</body>
</html>
