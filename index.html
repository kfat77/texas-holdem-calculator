<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="theme-color" content="#0d3320">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="扑克计算器">
    <meta name="description" content="德州扑克概率计算器 - 支持全阶段牌型概率计算，纯前端无需联网">
    <meta name="format-detection" content="telephone=no">
    
    <title>德州扑克概率计算器</title>
    
    <link rel="manifest" href="manifest.json">
    <link rel="apple-touch-icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 192 192'%3E%3Crect width='192' height='192' rx='24' fill='%230d3320'/%3E%3Ctext x='96' y='120' font-size='100' text-anchor='middle' fill='%23ffd700'%3E♠%3C/text%3E%3C/svg%3E">
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div class="container">
        <header>
            <h1>扑克概率计算器</h1>
            <p>选花色 → 选数字，组合成牌计算概率</p>
        </header>

        <!-- 阶段指示器 -->
        <div class="stage-indicator" id="stage-indicator">
            <div class="stage-item active" id="stage-preflop" data-stage="0">Pre-flop</div>
            <div class="stage-item" id="stage-flop" data-stage="3">Flop</div>
            <div class="stage-item" id="stage-turn" data-stage="4">Turn</div>
            <div class="stage-item" id="stage-river" data-stage="5">River</div>
        </div>

        <!-- 已选牌展示 -->
        <div class="section">
            <div class="section-title">🃏 当前选择</div>
            <div class="selected-cards-area">
                <div class="card-group">
                    <div class="card-group-label">你的手牌 (2张)</div>
                    <div class="card-slots" id="hole-slots">
                        <div class="card-slot" data-index="0" onclick="removeHoleCard(0)"></div>
                        <div class="card-slot" data-index="1" onclick="removeHoleCard(1)"></div>
                    </div>
                </div>
                <div class="card-group">
                    <div class="card-group-label">公共牌 (0-5张)</div>
                    <div class="card-slots" id="community-slots">
                        <div class="card-slot" data-index="0" onclick="removeCommunityCard(0)"></div>
                        <div class="card-slot" data-index="1" onclick="removeCommunityCard(1)"></div>
                        <div class="card-slot" data-index="2" onclick="removeCommunityCard(2)"></div>
                        <div class="card-slot" data-index="3" onclick="removeCommunityCard(3)"></div>
                        <div class="card-slot" data-index="4" onclick="removeCommunityCard(4)"></div>
                    </div>
                </div>
            </div>
        </div>

        <!-- 两步选牌区域 -->
        <div class="section">
            <div class="section-title">🎯 选择手牌</div>
            
            <div class="picker-hint" id="picker-hint">
                <strong>① 选一个花色</strong> → <strong>② 选一个数字</strong>
            </div>
            
            <!-- 花色选择 -->
            <div class="suit-picker" id="suit-picker">
                <button class="suit-btn" data-suit="♠" onclick="selectSuit('♠')">
                    <span class="suit-icon">♠</span>
                    <span class="suit-name">黑桃</span>
                </button>
                <button class="suit-btn" data-suit="♥" onclick="selectSuit('♥')">
                    <span class="suit-icon">♥</span>
                    <span class="suit-name">红桃</span>
                </button>
                <button class="suit-btn" data-suit="♣" onclick="selectSuit('♣')">
                    <span class="suit-icon">♣</span>
                    <span class="suit-name">梅花</span>
                </button>
                <button class="suit-btn" data-suit="♦" onclick="selectSuit('♦')">
                    <span class="suit-icon">♦</span>
                    <span class="suit-name">方块</span>
                </button>
            </div>
            
            <!-- 数字选择 -->
            <div class="rank-picker" id="rank-picker"></div>
        </div>

        <!-- 操作按钮 -->
        <div class="section" style="text-align:center;">
            <div class="actions">
                <button class="btn btn-primary" id="calc-btn" onclick="calculate()" disabled>计算概率</button>
                <button class="btn btn-secondary" id="undo-btn" onclick="undoLastCard()" disabled>↩️ 撤销</button>
                <button class="btn btn-secondary" onclick="clearAll()">清除全部</button>
            </div>
        </div>

        <!-- 进度条 -->
        <div class="progress-container" id="progress-area">
            <div class="progress-text" id="progress-text">正在计算...</div>
            <div class="progress-bar"><div class="progress-fill" id="progress-fill"></div></div>
        </div>

        <!-- 结果展示 -->
        <div class="section result-section" id="result-area">
            <div class="section-title">📊 概率分析</div>
            <div class="result-info" id="result-info"></div>
            <div class="probability-list" id="probability-list"></div>
        </div>

        <footer>
            <p>仅供学习娱乐使用 · 请理性游戏</p>
        </footer>
    </div>

    <!-- PWA 安装提示条 -->
    <div class="pwa-install-banner" id="pwa-banner">
        <span>添加到主屏幕，像App一样使用</span>
        <button class="btn btn-primary" id="pwa-install-btn" onclick="installPWA()" style="padding:8px 20px;font-size:0.85em;min-height:auto;">安装</button>
        <button class="btn btn-secondary" onclick="dismissPWA()" style="padding:8px 14px;font-size:0.85em;min-height:auto;">✕</button>
    </div>

    <script src="js/poker-engine.js"></script>
    <script>
        // ============ PWA 支持 ============
        let deferredPrompt = null;
        
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('./sw.js')
                    .then(reg => console.log('SW 注册成功'))
                    .catch(err => console.log('SW 注册失败:', err));
            });
        }
        
        window.addEventListener('beforeinstallprompt', (e) => {
            e.preventDefault();
            deferredPrompt = e;
            setTimeout(() => {
                const banner = document.getElementById('pwa-banner');
                if (banner && !localStorage.getItem('pwa-dismissed')) {
                    banner.classList.add('show');
                }
            }, 3000);
        });
        
        function installPWA() {
            if (deferredPrompt) {
                deferredPrompt.prompt();
                deferredPrompt.userChoice.then((choiceResult) => {
                    if (choiceResult.outcome === 'accepted') {
                        console.log('用户接受了PWA安装');
                    }
                    deferredPrompt = null;
                    document.getElementById('pwa-banner').classList.remove('show');
                });
            } else {
                alert('iOS用户：请点击 Safari 底部分享按钮，然后选择「添加到主屏幕」');
            }
        }
        
        function dismissPWA() {
            document.getElementById('pwa-banner').classList.remove('show');
            localStorage.setItem('pwa-dismissed', 'true');
        }
        
        if (window.matchMedia('(display-mode: standalone)').matches || navigator.standalone === true) {
            document.body.classList.add('standalone');
        }

        // ============ 核心逻辑 ============
        let holeCards = [];
        let communityCards = [];
        let selectedSuit = '♠';
        let cardHistory = []; // 记录添加顺序，用于撤销
        const RANKS_ORDER = ['A', 'K', 'Q', 'J', '10', '9', '8', '7', '6', '5', '4', '3', '2'];

        function init() {
            renderRankPicker();
            updateUI();
        }

        function renderRankPicker() {
            const container = document.getElementById('rank-picker');
            container.innerHTML = '';
            
            for (const rank of RANKS_ORDER) {
                const btn = document.createElement('button');
                btn.className = 'rank-btn';
                btn.textContent = rank;
                btn.dataset.rank = rank;
                btn.setAttribute('aria-label', '数字' + rank);
                btn.onclick = () => onRankClick(rank);
                container.appendChild(btn);
            }
        }

        function selectSuit(suit) {
            selectedSuit = suit;
            updateSuitButtons();
            updateRankButtons();
        }

        function onRankClick(rank) {
            const cardStr = selectedSuit + rank;
            const card = new Card(selectedSuit, rank);
            
            const inHole = holeCards.find(c => c.toString() === cardStr);
            const inCommunity = communityCards.find(c => c.toString() === cardStr);
            
            if (inHole) {
                // 取消选择（从手牌中移除）
                holeCards = holeCards.filter(c => c.toString() !== cardStr);
                cardHistory = cardHistory.filter(h => h !== cardStr);
            } else if (inCommunity) {
                // 取消选择（从公共牌中移除）
                communityCards = communityCards.filter(c => c.toString() !== cardStr);
                cardHistory = cardHistory.filter(h => h !== cardStr);
            } else {
                // 添加新牌
                if (holeCards.length < 2) {
                    holeCards.push(card);
                    cardHistory.push(cardStr);
                } else if (communityCards.length < 5) {
                    communityCards.push(card);
                    cardHistory.push(cardStr);
                }
            }
            
            updateUI();
        }

        // 撤销上一张
        function undoLastCard() {
            if (cardHistory.length === 0) return;
            
            const lastCardStr = cardHistory[cardHistory.length - 1];
            
            // 从手牌或公共牌中移除
            const inHole = holeCards.find(c => c.toString() === lastCardStr);
            if (inHole) {
                holeCards = holeCards.filter(c => c.toString() !== lastCardStr);
            } else {
                communityCards = communityCards.filter(c => c.toString() !== lastCardStr);
            }
            
            // 从历史记录中移除
            cardHistory.pop();
            
            updateUI();
        }

        function removeHoleCard(index) {
            if (index < holeCards.length) {
                const removed = holeCards[index].toString();
                holeCards.splice(index, 1);
                cardHistory = cardHistory.filter(h => h !== removed);
                updateUI();
            }
        }

        function removeCommunityCard(index) {
            if (index < communityCards.length) {
                const removed = communityCards[index].toString();
                communityCards.splice(index, 1);
                cardHistory = cardHistory.filter(h => h !== removed);
                updateUI();
            }
        }

        function clearAll() {
            holeCards = [];
            communityCards = [];
            cardHistory = [];
            document.getElementById('result-area').classList.remove('visible');
            document.getElementById('progress-area').classList.remove('visible');
            updateUI();
        }

        function updateSuitButtons() {
            document.querySelectorAll('.suit-btn').forEach(btn => {
                const suit = btn.dataset.suit;
                btn.classList.toggle('active', suit === selectedSuit);
            });
        }

        function updateRankButtons() {
            document.querySelectorAll('.rank-btn').forEach(btn => {
                const rank = btn.dataset.rank;
                const cardStr = selectedSuit + rank;
                
                let isSelected = false;
                for (const s of SUITS) {
                    const cs = s + rank;
                    if (holeCards.find(c => c.toString() === cs) || 
                        communityCards.find(c => c.toString() === cs)) {
                        isSelected = true;
                        break;
                    }
                }
                
                const isCurrentSelected = holeCards.find(c => c.toString() === cardStr) || 
                                          communityCards.find(c => c.toString() === cardStr);
                
                btn.classList.remove('selected', 'disabled', 'other-suit');
                
                if (isCurrentSelected) {
                    btn.classList.add('selected');
                } else if (isSelected) {
                    btn.classList.add('other-suit');
                }
                
                if (holeCards.length >= 2 && communityCards.length >= 5 && !isSelected) {
                    btn.classList.add('disabled');
                }
            });
        }

        // 更新阶段指示器 - 动态显示当前状态
        function updateStageIndicator() {
            const stages = ['preflop', 'flop', 'turn', 'river'];
            const cc = communityCards.length;
            const hc = holeCards.length;
            
            // 清除所有active
            stages.forEach(s => {
                document.getElementById('stage-' + s).classList.remove('active');
            });
            
            let activeStage = 'preflop';
            let stageText = 'Pre-flop';
            
            if (cc === 0) {
                // 翻牌前阶段
                activeStage = 'preflop';
                if (hc < 2) {
                    stageText = `Pre-flop · 还需${2 - hc}张手牌`;
                } else {
                    stageText = 'Pre-flop · 翻牌前';
                }
            } else if (cc < 3) {
                // 还在翻牌前阶段，等待翻牌（3张公共牌）
                activeStage = 'preflop';
                stageText = `Pre-flop · 还需${3 - cc}张翻牌`;
            } else if (cc === 3) {
                activeStage = 'flop';
                stageText = 'Flop · 翻牌圈';
            } else if (cc === 4) {
                activeStage = 'turn';
                stageText = 'Turn · 转牌圈';
            } else if (cc === 5) {
                activeStage = 'river';
                stageText = 'River · 河牌圈';
            }
            
            const activeEl = document.getElementById('stage-' + activeStage);
            activeEl.classList.add('active');
            activeEl.textContent = stageText;
            
            // 恢复其他阶段的原始文本
            const originalTexts = { 'preflop': 'Pre-flop', 'flop': 'Flop', 'turn': 'Turn', 'river': 'River' };
            stages.forEach(s => {
                if (s !== activeStage) {
                    document.getElementById('stage-' + s).textContent = originalTexts[s];
                }
            });
        }

        function updateUI() {
            const holeSlots = document.getElementById('hole-slots').children;
            for (let i = 0; i < 2; i++) {
                const slot = holeSlots[i];
                if (i < holeCards.length) {
                    const c = holeCards[i];
                    slot.textContent = c.toString();
                    slot.className = 'card-slot filled ' + ((c.suit === '♥' || c.suit === '♦') ? 'red' : 'black');
                } else {
                    slot.textContent = '';
                    slot.className = 'card-slot';
                }
            }
            
            const commSlots = document.getElementById('community-slots').children;
            for (let i = 0; i < 5; i++) {
                const slot = commSlots[i];
                if (i < communityCards.length) {
                    const c = communityCards[i];
                    slot.textContent = c.toString();
                    slot.className = 'card-slot filled ' + ((c.suit === '♥' || c.suit === '♦') ? 'red' : 'black');
                } else {
                    slot.textContent = '';
                    slot.className = 'card-slot';
                }
            }
            
            updateHint();
            updateSuitButtons();
            updateRankButtons();
            updateStageIndicator();
            
            // 更新按钮状态
            document.getElementById('calc-btn').disabled = holeCards.length !== 2;
            document.getElementById('undo-btn').disabled = cardHistory.length === 0;
        }

        function updateHint() {
            const hint = document.getElementById('picker-hint');
            const hc = holeCards.length;
            const cc = communityCards.length;
            
            let hintHTML = '';
            if (hc < 2) {
                hintHTML = `<strong>① 选花色 → ② 选数字</strong> <span style="color:var(--text-secondary);margin-left:8px;">还需 ${2 - hc} 张手牌</span>`;
            } else if (cc < 3) {
                hintHTML = `<strong>① 选花色 → ② 选数字</strong> <span style="color:var(--text-secondary);margin-left:8px;">还需 ${3 - cc} 张翻牌</span>`;
            } else if (cc < 5) {
                hintHTML = `<strong>① 选花色 → ② 选数字</strong> <span style="color:var(--text-secondary);margin-left:8px;">还需 ${5 - cc} 张公共牌</span>`;
            } else {
                hintHTML = `<span style="color:var(--success);">✓ 已选满 ${hc + cc} 张牌，可以计算了</span>`;
            }
            hint.innerHTML = hintHTML;
        }

        async function calculate() {
            if (holeCards.length !== 2) return;
            const progressArea = document.getElementById('progress-area');
            const progressFill = document.getElementById('progress-fill');
            const progressText = document.getElementById('progress-text');
            const resultArea = document.getElementById('result-area');
            
            progressArea.classList.add('visible');
            resultArea.classList.remove('visible');
            progressFill.style.width = '0%';
            
            await new Promise(r => setTimeout(r, 50));
            progressText.textContent = '正在计算中...';
            progressFill.style.width = '30%';
            await new Promise(r => setTimeout(r, 50));
            
            setTimeout(() => {
                const result = calculateProbabilities(holeCards, communityCards);
                progressFill.style.width = '100%';
                progressText.textContent = '计算完成';
                setTimeout(() => {
                    progressArea.classList.remove('visible');
                    showResults(result);
                }, 300);
            }, 100);
        }

        function showResults(result) {
            const resultArea = document.getElementById('result-area');
            const resultInfo = document.getElementById('result-info');
            const probList = document.getElementById('probability-list');
            
            const methodText = result.exact ? '精确计算' : '蒙特卡洛模拟';
            const badgeClass = result.exact ? 'exact-badge' : 'monte-badge';
            resultInfo.innerHTML = `
                <div style="margin-bottom:4px;">${getStageName()}</div>
                <div><span class="${badgeClass}">${methodText}</span></div>
                <div style="margin-top:6px;font-size:0.8rem;color:var(--text-muted);">评估 ${result.total.toLocaleString()} 种组合</div>
            `;
            
            probList.innerHTML = '';
            const maxProb = result.top7[0].probability;
            
            for (let i = 0; i < result.top7.length; i++) {
                const item = result.top7[i];
                if (item.probability <= 0) continue;
                const pct = item.probability.toFixed(2);
                const wp = maxProb > 0 ? (item.probability / maxProb * 100) : 0;
                let bc = 'very-low';
                if (item.probability > 20) bc = 'high';
                else if (item.probability > 5) bc = 'medium';
                else if (item.probability > 1) bc = 'low';
                
                const div = document.createElement('div');
                div.className = 'prob-item';
                div.innerHTML = `
                    <div class="prob-label">${item.name}</div>
                    <div class="prob-bar-container">
                        <div class="prob-bar ${bc}" style="width:0%">${pct}%</div>
                    </div>
                `;
                probList.appendChild(div);
                setTimeout(() => {
                    div.querySelector('.prob-bar').style.width = Math.max(wp, 8) + '%';
                }, 100 + i * 100);
            }
            
            resultArea.classList.add('visible');
            resultArea.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
        }

        function getStageName() {
            const c = communityCards.length;
            if (c === 0) return 'Pre-flop（翻牌前）';
            if (c === 3) return 'Flop（翻牌圈）';
            if (c === 4) return 'Turn（转牌圈）';
            if (c === 5) return 'River（河牌圈）';
            return '未知阶段';
        }

        init();
    </script>
</body>
</html>
